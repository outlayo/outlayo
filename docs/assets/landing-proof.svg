  <text x="892" y="230" fill="#12263A" font-family="Arial, sans-serif" font-size="16">App-side usage interception</text>
  <text x="1087" y="230" fill="#0D5F5A" font-family="Arial, sans-serif" font-size="16" font-weight="700">Primary</text>
  <rect x="874" y="252" width="282" height="38" rx="12" fill="#FFFDFC" stroke="#E3EAE7"/>
  <text x="892" y="276" fill="#12263A" font-family="Arial, sans-serif" font-size="16">Authoritative vendor feeds</text>
  <text x="1082" y="276" fill="#0D5F5A" font-family="Arial, sans-serif" font-size="16" font-weight="700">Reconcile</text>
  <rect x="874" y="298" width="282" height="38" rx="12" fill="#FFFDFC" stroke="#E3EAE7"/>
  <text x="892" y="322" fill="#12263A" font-family="Arial, sans-serif" font-size="16">Confidence-aware spend model</text>
  <text x="1098" y="322" fill="#0D5F5A" font-family="Arial, sans-serif" font-size="16" font-weight="700">Tracked</text>

  <rect x="38" y="418" width="386" height="128" rx="20" fill="#FFFFFF" stroke="#D7E2DE"/>
  <text x="68" y="454" fill="#335067" font-family="Arial, sans-serif" font-size="14" font-weight="700">DIFFERENTIATOR</text>
  <text x="68" y="488" fill="#12263A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Coverage without waiting on vendors</text>
  <text x="68" y="522" fill="#50657A" font-family="Arial, sans-serif" font-size="18">Intercept real traffic first, so weak billing APIs do not block visibility.</text>

  <rect x="446" y="418" width="386" height="128" rx="20" fill="#FFFFFF" stroke="#D7E2DE"/>
  <text x="476" y="454" fill="#335067" font-family="Arial, sans-serif" font-size="14" font-weight="700">RECONCILIATION</text>
  <text x="476" y="488" fill="#12263A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Authoritative where possible</text>
  <text x="476" y="522" fill="#50657A" font-family="Arial, sans-serif" font-size="18">Pull vendor telemetry where strong feeds exist to tighten confidence.</text>

  <rect x="854" y="418" width="388" height="128" rx="20" fill="#FFFFFF" stroke="#D7E2DE"/>
  <text x="884" y="454" fill="#335067" font-family="Arial, sans-serif" font-size="14" font-weight="700">ACTION</text>
  <text x="884" y="488" fill="#12263A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Alert before margin slips</text>
  <text x="884" y="522" fill="#50657A" font-family="Arial, sans-serif" font-size="18">Forecast budget and free-tier breaches before invoices surprise you.</text>

