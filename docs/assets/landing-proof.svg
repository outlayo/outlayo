  <rect x="38" y="110" width="1204" height="286" rx="28" fill="#FFFDFC" stroke="#D7E2DE"/>
  <text x="84" y="168" fill="#0D5F5A" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">USAGE-BASED SPEND CONTROL</text>
  <text x="84" y="236" fill="#12263A" font-family="Georgia, serif" font-size="52" font-weight="700">Stop surprise usage bills</text>
  <text x="84" y="292" fill="#12263A" font-family="Georgia, serif" font-size="52" font-weight="700">before they hit your runway.</text>
  <text x="84" y="338" fill="#50657A" font-family="Arial, sans-serif" font-size="24">Outlayo intercepts app-side API usage, turns it into spend</text>
  <text x="84" y="370" fill="#50657A" font-family="Arial, sans-serif" font-size="24">signals, and reconciles it with vendor data where strong billing feeds exist.</text>
