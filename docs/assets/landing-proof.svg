  <text x="74" y="618" fill="#12263A" font-family="Georgia, serif" font-size="34" font-weight="700">Instrument one costly workflow this week.</text>
  <text x="74" y="654" fill="#315167" font-family="Arial, sans-serif" font-size="20">Start with app-side interception, then layer in connector reconciliation where telemetry is strong.</text>
